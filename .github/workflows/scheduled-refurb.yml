name: Scheduled Refurb Check

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    paths:
      - ".github/workflows/scheduled-refurb.yml"

permissions:
  contents: read

concurrency:
  group: scheduled-refurb-check
  cancel-in-progress: true

jobs:
  check:
    name: Scheduled refurb inventory check
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger
        run: echo "event=${{ github.event_name }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check Apple refurbished inventory
        run: bun run check.ts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
