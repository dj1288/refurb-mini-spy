          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
name: Manual Refurb Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Manual refurb inventory check
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger
        run: echo "event=${{ github.event_name }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check Apple refurbished inventory
        run: bun run check.ts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
