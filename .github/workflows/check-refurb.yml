name: Check Apple Refurbished Mac Minis and Studios

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/check-refurb.yml"
      - "check.ts"
      - "lib/scrape.ts"

permissions:
  contents: read

concurrency:
  group: check-refurb
  cancel-in-progress: true

jobs:
  check:
    name: Check refurb inventory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check Apple refurbished inventory
        run: bun run check.ts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
